name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Minimum permissions required for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress on new push
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Secrets are passed as env vars (best practice — never interpolated
      # directly into run scripts, so values stay masked in logs)
      - name: Generate src/config.js from secrets
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          {
            printf "window.XAI_API_KEY = '%s';\n"      "$XAI_API_KEY"
            printf "window.ANTHROPIC_KEY = '%s';\n"    "$ANTHROPIC_KEY"
            printf "window.SUPABASE_URL = '%s';\n"     "$SUPABASE_URL"
            printf "window.SUPABASE_ANON_KEY = '%s';\n" "$SUPABASE_ANON_KEY"
          } > src/config.js

      # Copy only the files the app actually needs — skip node_modules
      # (Playwright dev dependency would push the artifact over 500 MB)
      - name: Prepare deploy directory
        run: |
          mkdir -p _site/src
          find . -maxdepth 1 -name "*.html" -exec cp {} _site/ \;
          cp src/voiceTask.js _site/src/voiceTask.js
          cp src/config.js   _site/src/config.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
